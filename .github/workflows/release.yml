name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-size: '3.12'
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest
        run: |
          pytest tests/

  build-binaries:
    name: Build Standalone Binaries
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: cloud-auditor-linux
          - os: macos-latest
            artifact_name: cloud-auditor-macos
          - os: windows-latest
            artifact_name: cloud-auditor-windows.exe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile main.py --name cloud-auditor

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv dist/cloud-auditor dist/${{ matrix.artifact_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          rename dist\cloud-auditor.exe ${{ matrix.artifact_name }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Binary
        uses: actions/download-artifact@v4
        with:
          name: cloud-auditor-windows.exe
          path: ./dist

      - name: Download Linux Binary
        uses: actions/download-artifact@v4
        with:
          name: cloud-auditor-linux
          path: ./dist

      - name: Download macOS Binary
        uses: actions/download-artifact@v4
        with:
          name: cloud-auditor-macos
          path: ./dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Python Distribution Packages
        run: |
          pip install wheel setuptools
          python setup.py sdist bdist_wheel

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cloud-auditor-windows.exe
            dist/cloud-auditor-linux
            dist/cloud-auditor-macos
            dist/*.whl
            dist/*.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
